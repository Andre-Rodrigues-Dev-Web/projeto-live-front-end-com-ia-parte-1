<article class="destination-card">
  <div class="image-wrapper">
    <!-- Usando cor de fallback temporária até que a imagem seja fornecida no projeto -->
    <img [src]="imageSrc" [alt]="title" loading="eager" decoding="async" crossorigin="anonymous" onerror="this.style.display='none'" />
    <div class="fallback-img" aria-hidden="true"></div>
  </div>
  <div class="card-content">
    <h3 class="destination-title">{{ title }}</h3>
    <div class="price-container">
      <span class="price-label">Valor a vista:</span>
      <span class="price-value">R$ {{ price | number:'1.2-2' }}</span>
    </div>
    <button class="buy-btn">Quero passagens!</button>
  </div>
</article>
