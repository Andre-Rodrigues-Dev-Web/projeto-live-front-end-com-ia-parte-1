<article class="promo-banner">
  <div class="banner-content">
    <h3 class="banner-tagline" [innerHTML]="tagline()"></h3>

    <div class="promo-highlight">
      <div class="discount-badge">
        <span class="discount-value" [innerHTML]="discountBadge()"></span>
      </div>
      <p class="banner-desc" [innerHTML]="description()"></p>
    </div>

    <button class="buy-btn">Quero passagens!</button>
  </div>
</article>
