<div class="ticket-search-card">
  <div class="form-section">
    <div class="input-grid">
      <!-- Ordem original de leitura -->
      <app-ticket-input label="Saindo de:" placeholder="Digite a cidade"></app-ticket-input>
      <app-ticket-input label="Data de ida:" placeholder="00/00"></app-ticket-input>
      
      <app-ticket-input label="Indo para:" placeholder="Digite a cidade"></app-ticket-input>
      <app-ticket-input label="Data de retorno:" placeholder="00/00"></app-ticket-input>
    </div>

    <!-- Toggles -->
    <div class="toggles-section">
      <app-ticket-toggle label="Buscar pela data mais barata"></app-ticket-toggle>
      <app-ticket-toggle label="Dicas da IA para viagens"></app-ticket-toggle>
    </div>

    <button class="search-btn">Buscar passagem</button>
  </div>

  <div class="image-section">
    <figure class="airplane-image-placeholder">
      <img src="assets/imgs/aviao.png" alt="Ilustração vista de cima de um avião comercial de passageiros"
        loading="lazy" decoding="async" onerror="this.style.display='none'" />
      <div class="fallback-plane" aria-hidden="true"></div>
    </figure>
  </div>
</div>
